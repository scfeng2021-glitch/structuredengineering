<!DOCTYPE html>
<html lang="it">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structured Engineering S.R.L.</title>

<style>
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 999;
    }

    body {
        padding-top: 140px;
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #0d0d0d;
        color: #e0e0e0;

        /* ⭐ EFFETTO SCHERMO NERO + APPARIZIONE LENTA */
        opacity: 0;
        animation: fadeInSlow 2.4s ease forwards;
    }

    @keyframes fadeInSlow {
        0%   { opacity: 0; }
        40%  { opacity: 0; }   /* resta nero per un po’ */
        100% { opacity: 1; }   /* appare lentamente */
    }

    h1, h2, h3 {
        font-family: 'Cinzel', serif;
        letter-spacing: 1px;
    }

    section:first-of-type {
        margin-top: 60px;
    }

    :root {
        --gold: #c6a667;
        --dark: #0d0d0d;
        --gray: #1a1a1a;
        --light-gray: #d0d0d0;
    }

    header {
        background: linear-gradient(180deg, #000000, #1a1a1a);
        padding: 40px 20px;
        border-bottom: 2px solid var(--gold);
    }

    header .container {
        max-width: 1100px;
        margin: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        font-size: 42px;
        color: var(--gold);
        margin-bottom: 10px;
        letter-spacing: 2px;
    }

    header p {
        font-size: 18px;
        opacity: 0.85;
    }

    .lang-switcher span {
        cursor: pointer;
        color: var(--gold);
        font-weight: bold;
        margin-left: 10px;
    }

    .lang-switcher span:hover {
        opacity: 0.6;
    }

    section {
        max-width: 1100px;
        margin: auto;
        padding: 50px 20px;
        border-bottom: 1px solid #222;
    }

    h2 {
        color: var(--gold);
        font-size: 28px;
        margin-bottom: 20px;
        letter-spacing: 1px;
    }

    h3 {
        color: var(--gold);
        margin-top: 30px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        margin-top: 20px;
    }

    .card {
        background: #111;
        padding: 25px;
        border: 1px solid #222;
        border-radius: 8px;
        cursor: pointer;
    }

    .card:hover {
        border-color: var(--gold);
        transition: 0.3s;
    }

    footer {
        text-align: center;
        padding: 40px;
        background: #000;
        border-top: 2px solid var(--gold);
        color: #e0e0e0;
    }

    a {
        color: var(--gold);
        text-decoration: none;
    }

    a:hover {
        opacity: 0.7;
    }

    /* PATTERN TECNICO LATERALE */
    .side-pattern {
        position: fixed;
        top: 0;
        width: 60px;
        height: 100vh;
        background-image: repeating-linear-gradient(
            to bottom,
            rgba(198, 166, 103, 0.08) 0px,
            rgba(198, 166, 103, 0.08) 1px,
            transparent 1px,
            transparent 8px
        );
        z-index: 997;
    }

    #pattern-left { left: 0; }
    #pattern-right { right: 0; }

    /* TESTO VERTICALE CORPORATE */
    .side-text {
        position: fixed;
        top: 50%;
        transform: translateY(-50%) rotate(-90deg);
        font-size: 12px;
        letter-spacing: 3px;
        color: var(--gold);
        opacity: 0.35;
        z-index: 998;
        font-weight: bold;
    }

    #text-left { left: -120px; }
    #text-right { right: -120px; }

    /* GDPR COOKIE BANNER */
    #cookie-banner {
        position: fixed;
        bottom: 0;
        left: 0;
        width: calc(100% - 20px);
        background: #111;
        border-top: 2px solid var(--gold);
        padding: 15px 10px;
        color: #e0e0e0;
        font-size: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
        z-index: 9999;
        box-sizing: border-box;
    }

    #cookie-banner span {
        line-height: 1.4;
    }

    #cookie-banner button {
        background: var(--gold);
        color: #000;
        border: none;
        padding: 8px 15px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        align-self: flex-end;
        max-width: 100%;
    }

    #cookie-banner button:hover {
        opacity: 0.8;
    }

    /* CARD DETAILS PANEL */
    .card-details {
        display: none;
        background: #0f0f0f;
        border: 1px solid var(--gold);
        padding: 20px;
        margin-top: 15px;
        border-radius: 8px;
        animation: fadeIn 0.3s ease;
    }

    .card-details p {
        margin: 8px 0;
        line-height: 1.5;
    }

    .card-details .close-btn {
        float: right;
        cursor: pointer;
        color: var(--gold);
        font-weight: bold;
        font-size: 18px;
    }

    .card-details .close-btn:hover {
        opacity: 0.6;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div id="pattern-left" class="side-pattern"></div>
<div id="pattern-right" class="side-pattern"></div>

<div id="text-left" class="side-text">ENGINEERING STRUCTURE — OPERATIONAL CONTINUITY</div>
<div id="text-right" class="side-text">STRUCTURED • RELIABLE • CONTINUOUS</div>

<div id="cookie-banner">
    <span id="cookie-text" data-key="cookie_banner_text"></span>
    <button id="cookie-ok-btn" data-key="cookie_banner_ok"></button>
</div>

<header>
    <div class="container">
        <div style="display:flex; align-items:center; gap:20px;">
            <img src="logo.png" alt="Structured Engineering Logo" style="height:70px;">
            <div>
                <h1 data-key="title"></h1>
                <p data-key="subtitle"></p>
            </div>
        </div>

        <div class="lang-switcher">
            <span class="lang-btn" data-lang="it">IT</span> |
            <span class="lang-btn" data-lang="en">EN</span> |
            <span class="lang-btn" data-lang="ro">RO</span>
        </div>
    </div>
</header>

<section>
    <h2 data-key="intro_title"></h2>
    <p data-key="intro_text"></p>
</section>

<section>
    <h2 data-key="challenges_title"></h2>
    <div class="grid">
        <div class="card">
            <h3 data-key="ch1_title"></h3>
            <p data-key="ch1_text"></p>
        </div>

        <div class="card">
            <h3 data-key="ch2_title"></h3>
            <p data-key="ch2_text"></p>
        </div>

        <div class="card">
            <h3 data-key="ch3_title"></h3>
            <p data-key="ch3_text"></p>
        </div>

        <div class="card">
            <h3 data-key="ch4_title"></h3>
            <p data-key="ch4_text"></p>
        </div>
    </div>
</section>

<section>
    <h2 data-key="services_title"></h2>

    <div class="grid">

        <!-- CARD 1 -->
        <div class="card" onclick="openDetails('s1_details')">
            <h3 data-key="s1"></h3>
            <div id="s1_details" class="card-details">
                <span class="close-btn" onclick="closeDetails(event, 's1_details')">×</span>
                <p data-key="s1_d1"></p>
                <p data-key="s1_d2"></p>
                <p data-key="s1_d3"></p>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="card" onclick="openDetails('s2_details')">
            <h3 data-key="s2"></h3>
            <div id="s2_details" class="card-details">
                <span class="close-btn" onclick="closeDetails(event, 's2_details')">×</span>
                <p data-key="s2_d1"></p>
                <p data-key="s2_d2"></p>
                <p data-key="s2_d3"></p>
            </div>
        </div>

        <!-- CARD 3 -->
        <div class="card" onclick="openDetails('s3_details')">
            <h3 data-key="s3"></h3>
            <div id="s3_details" class="card-details">
                <span class="close-btn" onclick="closeDetails(event, 's3_details')">×</span>
                <p data-key="s3_d1"></p>
                <p data-key="s3_d2"></p>
                <p data-key="s3_d3"></p>
            </div>
        </div>

        <!-- CARD 4 -->
        <div class="card" onclick="openDetails('s4_details')">
            <h3 data-key="s4"></h3>
            <div id="s4_details" class="card-details">
                <span class="close-btn" onclick="closeDetails(event, 's4_details')">×</span>
                <p data-key="s4_d1"></p>
                <p data-key="s4_d2"></p>
                <p data-key="s4_d3"></p>
            </div>
        </div>

        <!-- CARD 5 -->
        <div class="card" onclick="openDetails('s5_details')">
            <h3 data-key="s5"></h3>
            <div id="s5_details" class="card-details">
                <span class="close-btn" onclick="closeDetails(event, 's5_details')">×</span>
                <p data-key="s5_d1"></p>
                <p data-key="s5_d2"></p>
                <p data-key="s5_d3"></p>
            </div>
        </div>

        <!-- CARD 6 -->
        <div class="card" onclick="openDetails('s6_details')">
            <h3 data-key="s6"></h3>
            <div id="s6_details" class="card-details">
                <span class="close-btn" onclick="closeDetails(event, 's6_details')">×</span>
                <p data-key="s6_d1"></p>
                <p data-key="s6_d2"></p>
                <p data-key="s6_d3"></p>
            </div>
        </div>

        <!-- CARD 7 -->
        <div class="card" onclick="openDetails('s7_details')">
            <h3 data-key="s7"></h3>
            <div id="s7_details" class="card-details">
                <span class="close-btn" onclick="closeDetails(event, 's7_details')">×</span>
                <p data-key="s7_d1"></p>
                <p data-key="s7_d2"></p>
                <p data-key="s7_d3"></p>
            </div>
        </div>

    </div>
</section>

<!-- CONTATTI + QR CODE -->
<section id="contacts">
    <h2 data-key="contacts_title"></h2>

    <div style="margin-top:30px; text-align:center;">
        <img src="qrcode.png" alt="QR Code Structured Engineering" 
             style="width:180px; border:2px solid var(--gold); padding:10px; border-radius:10px;">
        <p style="margin-top:10px; color:var(--gold); font-size:14px;">Scan & Connect</p>
    </div>

    <p><strong>Email:</strong> 
        <a id="email-link" href="#" style="color: var(--gold);">
            <span data-key="email"></span>
        </a>
    </p>

    <p><strong data-key="phone"></strong></p>
    <p><strong data-key="location"></strong></p>
</section>

<section id="privacy">
    <h2 data-key="privacy_title" style="color: var(--gold);"></h2>
    <p data-key="privacy_p1"></p>
    <p data-key="privacy_p2"></p>
    <p data-key="privacy_p3"></p>
</section>

<section id="terms">
    <h2 data-key="terms_title" style="color: var(--gold);"></h2>
    <p data-key="terms_p1"></p>
    <p data-key="terms_p2"></p>
    <p data-key="terms_p3"></p>
</section>

<footer>
    Structured Engineering S.R.L. — Engineering Structure. Operational Continuity.
</footer>
<script src="lang.js"></script>

<script>
    const langButtons = document.querySelectorAll('.lang-btn');
    const cookieBanner = document.getElementById('cookie-banner');
    const cookieOkBtn = document.getElementById('cookie-ok-btn');

    cookieOkBtn.addEventListener('click', () => {
        cookieBanner.style.display = 'none';
    });

    function updateEmailLink(lang) {
        const subject = translations[lang].email_subject;
        document.getElementById("email-link").href =
            "mailto:strueng2026@proton.me?subject=" + encodeURIComponent(subject);
    }

    function applyLanguage(lang) {
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (translations[lang] && translations[lang][key]) {
                el.innerHTML = translations[lang][key];
            }
        });

        updateEmailLink(lang);
    }

    langButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.getAttribute('data-lang');
            applyLanguage(lang);
        });
    });

    applyLanguage('it');

    /* CARD DETAILS */
    function openDetails(id) {
        document.querySelectorAll('.card-details').forEach(el => el.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function closeDetails(event, id) {
        event.stopPropagation();
        document.getElementById(id).style.display = 'none';
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.card')) {
            document.querySelectorAll('.card-details').forEach(el => el.style.display = 'none');
        }
    });
</script>

</body>
</html>
